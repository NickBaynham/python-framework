name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PDM_CHECK_UPDATE: "0"

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: true

      - name: Install dependencies
        run: pdm install -G dev --frozen-lockfile

      - name: Lint
        run: |
          pdm run ruff check src tests
          pdm run ruff format --check src tests
          pdm run mypy src tests
          pdm run bandit -r src -c pyproject.toml

      - name: Security (dependency audit)
        if: matrix.python-version == '3.12'
        run: |
          pdm export -G dev -f requirements --without-hashes -o requirements-audit.txt
          pdm run pip-audit -r requirements-audit.txt --desc on
          rm -f requirements-audit.txt

      - name: Test
        run: pdm run pytest

      - name: Build package
        run: pdm build

      - name: Generate CycloneDX SBOM
        if: matrix.python-version == '3.12'
        run: |
          mkdir -p dist
          pdm run cyclonedx-py environment -o dist/sbom-cyclonedx.json

      - name: Upload distributions + SBOM
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist-and-sbom-py${{ matrix.python-version }}
          path: |
            dist/*

  docker-image:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch (export validates Dockerfile)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          tags: python-framework:ci-multi
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=local,dest=./docker-multi

      - name: Build amd64 image (load for smoke tests)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: python-framework:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container
        run: |
          docker run --rm python-framework:ci hello
          docker run --rm python-framework:ci ping | grep -q pong
